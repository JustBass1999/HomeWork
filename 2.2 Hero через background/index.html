<!DOCTYPE html>
<html class="page" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>DYSON</title>
</head>
<header class="header">
    <div class="container header__container">
        <div class="header__burger-title">
            <div class="header__burger-icon">
                <svg width="50" height="50">
                    <use class="burger-icon__icon" href="icons/sprite.svg#burger-icon"></use>
                </svg>
            </div>
            <a class="header__logo" href="#">
                <img src="/titles/лого.svg" width="183px" height="77px" alt="Логотип Dyson">
            </a>
        </div>
        <navigation class="header__nav">
            <ul class="header__nav-list">
                <a class="header__nav-link" aria-label="" href="#aboutUs">О нас</a>
                <a class="header__nav-link" aria-label="" href="#delivery&pay">Доставка и оплата</a>
                <a class="header__nav-link" aria-label="" href="#registration">Регистрация продукта</a>
                <a class="header__nav-link" aria-label="" href="#service">Сервис</a>
                <a class="header__nav-link" aria-label="" href="#certificates">Сертификаты и лицензии</a>
            </ul>
        </navigation>
        <div class="header__card">
            <svg width="36" height="36">
                <use class="header__card-icon" href="icons/sprite.svg#shopping-card"></use>
            </svg>
        </div>
    </div>
</header>

<body class="page__body">
    <main class="main">
        <section class="hero__section">
            <header class=" hero__header">
                <div class="hero__content">
                    <h2 class="hero__title">Уникальные технологии для ухода за волосами
                    </h2>
                    <div class="hero__description">Идеальная укладка для всех типов волос вместе с Dyson</div>
                    <button class="hero__button"><span class="hero__button-info">Подробнее</span></button>
                </div>
                <div class="hero__image">
                    <div class="hero__img"></div>
                </div>
            </header>
        </section>
    </main>
</body>

</html>
